<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maç TV | Player</title>

<!-- Video.js CSS -->
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

<style>
body {
    margin: 0;
    background: black;
}

.video-js {
    width: 100%;
    height: 100vh;
}
</style>
</head>

<body>

<!-- PLAYER -->
<video
    id="player"
    class="video-js vjs-default-skin"
    controls
    autoplay
    playsinline
>
    <source src="BURAYA_M3U8_LINK" type="application/x-mpegURL">
</video>

<!-- Video.js JS -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
var player = videojs('player', {
    controls: true,
    autoplay: true,
    preload: 'auto',
    fluid: true
});
</script>

</body>
</html>

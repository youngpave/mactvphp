<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç TV | Canlı Yayın</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        #player-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Tam ekran butonu tasarımı */
        #fs-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 10px 20px;
            background-color: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <!-- Tam ekran butonu -->
        <button id="fs-button" onclick="toggleFS()">TAM EKRAN</button>

        <iframe 
            id="streamFrame"
            src="https://4kstreamz.shop/new/stream-62.php" 
            allow="autoplay; encrypted-media; picture-in-picture" 
            allowfullscreen="true"
            scrolling="no"
            referrerpolicy="no-referrer"
            sandbox="allow-scripts allow-same-origin allow-forms">
        </iframe>
    </div>

    <script>
        function toggleFS() {
            var elem = document.getElementById("player-wrapper");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    alert(`Tam ekran hatası: ${err.message}`);
                });
                document.getElementById("fs-button").innerText = "KÜÇÜLT";
            } else {
                document.exitFullscreen();
                document.getElementById("fs-button").innerText = "TAM EKRAN";
            }
        }
    </script>

</body>
</html>

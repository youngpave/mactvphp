
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maç TV | Canlı Yayın</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* ANA KAPSAYICI */
.video-container {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
}

/* İFRAME TAM EKRAN */
iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

/* FULLSCREEN OLUNCA DA TAM KAPLA */
.video-container:fullscreen {
    width: 100vw;
    height: 100vh;
}

.video-container:fullscreen iframe {
    width: 100vw;
    height: 100vh;
}

/* BUTON */
#fs-button {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    background: red;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    z-index: 999;
}
</style>
</head>

<body>

<div class="video-container" id="player">

    <iframe 
        id="video"
        src="https://dlstreams.com/stream/stream-64.php"
        allow="autoplay; fullscreen"
        allowfullscreen>
    </iframe>

    <button id="fs-button" onclick="goFullScreen()">
        TAM EKRAN BAŞLAT
    </button>

</div>

<script>
const btn = document.getElementById("fs-button");
const player = document.getElementById("player");

function goFullScreen() {
    if (player.requestFullscreen) {
        player.requestFullscreen();
    } else if (player.webkitRequestFullscreen) {
        player.webkitRequestFullscreen();
    }

    btn.style.display = "none";
}

// fullscreen çıkınca buton geri gelsin
document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        btn.style.display = "block";
    }
});
</script>

</body>
</html>

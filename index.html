<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç TV | Canlı Yayın</title>
    <!-- Güvenilir ve reklamsız Clappr Player kütüphanesini çekiyoruz -->
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #player {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <!-- Oynatıcının yükleneceği alan -->
    <div id="player"></div>

    <script>
        // Bilgisayardan ağ (network) sekmesinden bulduğun .m3u8 linkini buraya yapıştır
        var m3u8_linki = "BURAYA_BULDUĞUN_M3U8_LİNKİNİ_YAPIŞTIR.m3u8";

        var player = new Clappr.Player({
            source: m3u8_linki,
            parentId: "#player",
            width: "100%",
            height: "100%",
            autoPlay: true, // Otomatik başlasın
            chromecast: true,
            muted: false
        });
    </script>

</body>
</html>

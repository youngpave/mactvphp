<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }

        .pencere {
            width: 100vw;         /* Ekran genişliği kadar */
            height: 56.25vw;      /* 16:9 oranında yükseklik (Video standardı) */
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .pencere iframe {
            position: absolute;
            
            /* DEĞİŞTİRİLECEK YERLER */
            top: -340px;          /* Siyahlığı gidermek için bu sayıyı küçült (örn: -300 yap) */
            left: 50%;            /* Sayfayı ortala */
            transform: translateX(-50%); /* Tam merkezleme */
            
            width: 1000px;        /* Orijinal sitenin masaüstü genişliği */
            height: 1500px;
            border: none;
        }
    </style>
</head>
<body>

<div class="pencere">
    <iframe src="https://taratv1.shop/Watch/M970499" scrolling="no"></iframe>
</div>

</body>
</html>

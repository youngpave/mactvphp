
<!DOCTYPE html>

<head>

    <title>Maç TV | Canlı Yayın</title>
    <style>
        * {

        body, html {

            height: 100%;
            border: none;
        }
    </style>

<body>

    <div class="video-container">
        <!-- Sandbox izinleri genişletildi -->

            src="https://4kstreamz.shop/new/stream-62.php" 
            allow="autoplay; encrypted-media; picture-in-picture" 
            allowfullscreen 
            scrolling="no"

        </iframe>
    </div>

</body>

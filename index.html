<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maç TV | Canlı Yayın</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
    }

    .video-container {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 1; /* Yayın arkada kalsın */
    }

    /* BUTONU BURADAN DÜZENLEDİM */
    #fs-button {
        position: fixed; /* Ekrana çiviler */
        bottom: 50px; /* Aşağıdan mesafe */
        left: 50%;
        transform: translateX(-50%);
        padding: 18px 40px;
        background: #ff0000; /* Parlak kırmızı */
        color: white;
        border: 2px solid white;
        border-radius: 50px;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
        z-index: 999999; /* Reklamların ve playerın üstünde kalması için çok yüksek değer */
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
        display: block; /* Başlangıçta mutlaka görünsün */
    }

    /* Tam ekranda buton gizleme */
    .video-container:fullscreen #fs-button {
        display: none;
    }
</style>
</head>

<body>

<div class="video-container" id="player">

    <iframe 
        id="video"
        src="https://dlstreams.com/stream/stream-62.php"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
    </iframe>

    <button id="fs-button" onclick="goFullScreen()">
        YAYINI TAM EKRAN BAŞLAT
    </button>

</div>

<script>
const btn = document.getElementById("fs-button");
const player = document.getElementById("player");

function goFullScreen() {
    // Tam ekrana geçiş denemesi
    if (player.requestFullscreen) {
        player.requestFullscreen();
    } else if (player.webkitRequestFullscreen) {
        player.webkitRequestFullscreen();
    } else if (player.msRequestFullscreen) {
        player.msRequestFullscreen();
    }
    
    // Butonu tıklandığı an gizle
    btn.style.setProperty('display', 'none', 'important');
}

// Tam ekrandan çıkışta butonu geri getirme
function checkExit() {
    if (!document.fullscreenElement && !document.webkitIsFullScreen && !document.mozFullScreen) {
        btn.style.setProperty('display', 'block', 'important');
    }
}

document.addEventListener("fullscreenchange", checkExit);
document.addEventListener("webkitfullscreenchange", checkExit);
document.addEventListener("mozfullscreenchange", checkExit);
</script>

</body>
</html>

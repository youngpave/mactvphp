<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maç TV | Canlı Yayın</title>
    <style>
        /* Tüm boşlukları sıfırla ve taşmaları engelle */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
            background-color: #000; /* Arka planı siyah yapar */
        }

        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://dlstreams.com/stream/stream-63.php" 
            allow="autoplay; encrypted-media" 
            allowfullscreen 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>

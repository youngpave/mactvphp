<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maç TV | Akıllı Tam Ekran</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
    }

    /* KAPSAYICI */
    .video-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* İFRAME - İzinler ve tam yerleşim */
    #video {
        width: 100%;
        height: 100%;
        border: none;
        background: #000;
    }

    /* BAŞLAT BUTONU */
    #fs-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 35px;
        background: #ff0000;
        color: white;
        border: 2px solid #fff;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        z-index: 9999;
        box-shadow: 0 0 20px rgba(255,0,0,0.5);
    }
</style>
</head>

<body>

<div class="video-wrapper">
    <iframe 
        id="video"
        src="https://dlstreams.com/stream/stream-63.php"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
    </iframe>

    <button id="fs-button" onclick="launchVideo()">
        YAYINI KENDİ TAM EKRANINDA BAŞLAT
    </button>
</div>

<script>
function launchVideo() {
    const iframe = document.getElementById("video");
    const btn = document.getElementById("fs-button");

    // DİKKAT: Burada player'ı değil, doğrudan IFRAME'i tam ekran yapıyoruz.
    // Bu, player'ın "ben tam ekrandayım" sanmasını sağlar.
    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
    } else if (iframe.mozRequestFullScreen) {
        iframe.mozRequestFullScreen();
    } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen();
    }

    // Butonu gizle
    btn.style.display = "none";
}

// Tam ekrandan çıkınca butonun geri gelmesi için
function exitHandler() {
    if (!document.fullscreenElement && !document.webkitIsFullScreen && !document.mozFullScreen) {
        document.getElementById("fs-button").style.display = "block";
    }
}

document.addEventListener("fullscreenchange", exitHandler);
document.addEventListener("webkitfullscreenchange", exitHandler);
document.addEventListener("mozfullscreenchange", exitHandler);
</script>

</body>
</html>

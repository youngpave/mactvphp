<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç TV | Canlı Yayın</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #fs-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            background: red;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            z-index: 999;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="video-container">

    <iframe 
        id="video-iframe"
        src="https://liveon4.zip/antena.php?id=1879"
        allow="autoplay; fullscreen"
        sandbox="allow-scripts allow-same-origin allow-fullscreen"
        allowfullscreen>
    </iframe>

    <button id="fs-button" onclick="goFullScreen()">
        YAYINI TAM EKRAN BAŞLAT
    </button>

</div>

<script>
function goFullScreen() {
    const iframe = document.getElementById("video-iframe");
    const btn = document.getElementById("fs-button");

    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
    } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen();
    }

    btn.style.display = "none";
}

// fullscreen çıkınca buton geri gelsin
document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        document.getElementById("fs-button").style.display = "block";
    }
});
</script>

</body>
</html>

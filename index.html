<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maç TV | Canlı Yayın</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* ANA KAPSAYICI */
.video-container {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* İFRAME AYARLARI */
iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
}

/* TAM EKRAN MODU ÖZEL AYARLARI (BOŞLUKLARI SIFIRLAR) */
.video-container:fullscreen {
    width: 100vw !important;
    height: 100vh !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #000;
}

/* Webkit (Chrome/Safari) için tam ekran boşluk sıfırlama */
.video-container:-webkit-full-screen {
    width: 100% !important;
    height: 100% !important;
    margin: 0 !important;
}

/* Tam ekrandayken iframe'i zorla yay */
.video-container:fullscreen iframe {
    width: 100vw !important;
    height: 100vh !important;
    top: 0 !important;
    left: 0 !important;
}

/* BUTON TASARIMI */
#fs-button {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 35px;
    background: #e50914; /* Netflix kırmızısı gibi daha canlı bir kırmızı */
    color: #fff;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    transition: transform 0.2s;
}

#fs-button:active {
    transform: translateX(-50%) scale(0.95);
}
</style>
</head>

<body>

<div class="video-container" id="player">

    <iframe 
        id="video"
        src="https://dlstreams.com/stream/stream-62.php"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
    </iframe>

    <button id="fs-button" onclick="goFullScreen()">
        YAYINI BAŞLAT (TAM EKRAN)
    </button>

</div>

<script>
const btn = document.getElementById("fs-button");
const player = document.getElementById("player");

function goFullScreen() {
    if (player.requestFullscreen) {
        player.requestFullscreen();
    } else if (player.webkitRequestFullscreen) {
        player.webkitRequestFullscreen();
    } else if (player.msRequestFullscreen) {
        player.msRequestFullscreen();
    }

    btn.style.display = "none";
}

// Fullscreen değişince buton kontrolü
function handleFSChange() {
    if (!document.fullscreenElement && !document.webkitIsFullScreen && !document.mozFullScreen) {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
}

document.addEventListener("fullscreenchange", handleFSChange);
document.addEventListener("webkitfullscreenchange", handleFSChange);
document.addEventListener("mozfullscreenchange", handleFSChange);
</script>

</body>
</html>

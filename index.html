<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Player Görünümü</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Player'ın görüneceği pencere */
        .kırpma-alani {
            width: 100%;
            max-width: 850px; /* Player genişliği */
            height: 480px;    /* Player yüksekliği */
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
            background: #000;
        }

        /* İçerideki asıl site */
        .kırpma-alani iframe {
            position: absolute;
            
            /* AYARLAR: Player'ı tam oturtmak için bu değerleri oyna */
            top: -415px;      /* Üstteki logoları ve reklamları yukarı kaydırır */
            left: -10px;      /* Varsa yan boşlukları dengeler */
            
            width: 1000px;    /* Sitenin orijinal genişliği (daraltma) */
            height: 1500px;   /* Sitenin toplam yüksekliği */
            
            border: none;
            pointer-events: auto; /* Tıklamalara izin verir */
        }

        /* Mobilde player kayarsa burayı kullanabilirsin */
        @media (max-width: 600px) {
            .kırpma-alani {
                height: 250px;
            }
            .kırpma-alani iframe {
                top: -380px; 
                width: 600px;
            }
        }
    </style>
</head>
<body>

<div class="kırpma-alani">
    <iframe src="https://www.taraftarium186.top/#tuggeranong-united-bayanlar-majura-bayanlar-canli-izle" scrolling="no"></iframe>
</div>

</body>
</html>

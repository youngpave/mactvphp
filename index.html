<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maç TV | Canlı Yayın</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Gelen harici player'ın ekrana tam oturması için */
        #player-alani {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <!-- IFRAME YOK! Sadece boş bir kutu var, içeriği PHP gizlice dolduracak -->
    <div id="player-alani"></div>

    <script>
        // Sayfa açıldığında arkadaki sahte kimlikli PHP dosyamızı çağırıyoruz
        fetch('player-getir.php')
            .then(response => response.text())
            .then(data => {
                // DaddyLive'dan gelen "Ben kendi sitemdeyim" sanan player'ı kutunun içine fırlatıyoruz
                document.getElementById('player-alani').innerHTML = data;
            })
            .catch(err => console.log("Yayın yüklenirken hata oluştu."));
    </script>

</body>
</html>

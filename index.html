<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Maç İzle - HD Yayın</title>
    <style>
        /* Modern ve Karanlık Tasarım */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background-color: #1a1d23;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #f0b90b;
            font-weight: bold;
            font-size: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .video-box {
            width: 100%;
            max-width: 1000px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            aspect-ratio: 16 / 9;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .info-bar {
            margin-top: 15px;
            padding: 10px;
            background: #1a1d23;
            border-radius: 5px;
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    MacTV
</div>

<div class="container">
    <div class="video-box">
        <iframe 
            src="https://liveon4.zip/antena.php?id=1879" 
            allowfullscreen="true" 
            scrolling="no">
        </iframe>
    </div>

    <div class="info-bar">
        Şu an yayını izliyorsunuz. Donma olursa sayfayı yenileyin.
    </div>
</div>

</body>
</html>

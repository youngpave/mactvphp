<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maç TV | Canlı Yayın</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; 
        }

        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Çift tıklamayı yakalayan ama tek tıklamayı player'a geçiren akıllı katman */
        .click-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="video-container" id="mainPlayer">
        <!-- Akıllı Tıklama Katmanı -->
        <div class="click-layer" id="trigger"></div>

        <!-- Oynatıcının en kararlı çalıştığı iframe ayarları -->
        <iframe 
            src="https://4kstreamz.shop/new/stream-62.php" 
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
            allowfullscreen="true"
            webkitallowfullscreen="true"
            mozallowfullscreen="true"
            scrolling="no"
            referrerpolicy="no-referrer"
            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation">
        </iframe>
    </div>

    <script>
        const container = document.getElementById('mainPlayer');
        const trigger = document.getElementById('trigger');
        let clickCount = 0;
        let clickTimer;

        trigger.addEventListener('click', function(e) {
            clickCount++;

            if (clickCount === 1) {
                // İlk tıklamada katmanı anlık olarak kaldırıyoruz ki yayını başlatabilesin veya sesi açabilesin
                trigger.style.pointerEvents = 'none';
                
                clickTimer = setTimeout(function() {
                    clickCount = 0;
                    // 300ms sonra katmanı geri geri getiriyoruz ki çift tıklama modu aktif kalsın
                    trigger.style.pointerEvents = 'auto';
                }, 300);
            } else if (clickCount === 2) {
                // Çift tıklama yakalandı!
                clearTimeout(clickTimer);
                clickCount = 0;
                trigger.style.pointerEvents = 'auto';
                toggleFullscreen();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>

</body>
</html>

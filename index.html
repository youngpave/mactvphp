<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Fullscreen Buton</title>

<style>
body, html {
    margin:0;
    padding:0;
    height:100%;
    background:#000;
    overflow:hidden;
}

.video-container {
    width:100%;
    height:100%;
    position:relative;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

#fs-button {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 25px;
    background:red;
    color:#fff;
    border:none;
    border-radius:50px;
    font-weight:bold;
    cursor:pointer;
    z-index:999;
}
</style>
</head>

<body>

<div class="video-container">

    <iframe id="video"
        src="https://dlstreams.com/stream/stream-63.php"
        allow="autoplay; fullscreen"
        allowfullscreen>
    </iframe>

    <button id="fs-button" onclick="goFullScreen()">
        TAM EKRAN BAŞLAT
    </button>

</div>

<script>
const btn = document.getElementById("fs-button");
const container = document.querySelector(".video-container");

// 15 saniye sonra buton kaybolur
let hideTime = 15000;

setTimeout(() => {
    btn.style.opacity = "0";
    btn.style.transition = "0.5s";

    setTimeout(() => {
        btn.style.display = "none";
    }, 500);
}, hideTime);

function goFullScreen() {
    if (container.requestFullscreen) {
        container.requestFullscreen();
    } else if (container.webkitRequestFullscreen) {
        container.webkitRequestFullscreen();
    }

    btn.style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maç TV | Ultra Koruma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* GÖRÜNMEZ KALKAN: Reklamların üzerine binmesini engeller */
        .shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90%; /* Alt barı (play butonu kısmı) açık bırakabilirsin veya 100% yapabilirsin */
            z-index: 999;
            background: transparent;
            pointer-events: none; /* İlk aşamada tıklamayı geçirsin */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="shield"></div>
        <iframe 
            id="main-stream"
            src="https://dlstreams.com/stream/stream-63.php" 
            allow="autoplay; encrypted-media; fullscreen" 
            allowfullscreen 
            scrolling="no">
        </iframe>
    </div>

    <script>
        // 1. Yeni sekme açılmasını kesin olarak engelle
        window.open = function() { return null; };

        // 2. Sayfadan ayrılma uyarısı (Yönlendirmeyi durdurur)
        window.onbeforeunload = function() {
            return "Yayından ayrılmak üzeresiniz!";
        };

        // 3. Agresif Tıklama Yakalayıcı
        document.addEventListener('click', function(e) {
            // Eğer tıklama bir linke gidiyorsa durdur
            if (e.target.closest('a') || e.target.tagName === 'A') {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);

        // 4. Periyodik Temizlik (İçeride açılan gizli reklamları siler)
        setInterval(function() {
            // Ana iframe dışındaki tüm iframe'leri ve pop-up benzeri divleri temizle
            document.querySelectorAll('iframe:not(#main-stream), [class*="pop"], [id*="pop"], [style*="z-index: 2147483647"]').forEach(el => {
                el.remove();
            });
        }, 300);
    </script>

</body>
</html>
